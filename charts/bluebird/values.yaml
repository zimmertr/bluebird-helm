nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

replicas: 1

image:
  name: zimmertr/bluebird
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []

containerPort: 8000
extraEnv: []
resources: {}
podSecurityContext: {}
securityContext: {}

probes:
  liveness:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
  startup:
    enabled: true
    httpGet:
      path: /
      port: 8000
    failureThreshold: 30
    periodSeconds: 5

# RollingUpdate | Recreate -> Deployment. Canary | BlueGreen -> Argo Rollout.
# The matching block below becomes the workload's spec.strategy verbatim.
strategy: RollingUpdate

# Deployment spec.strategy.rollingUpdate, verbatim.
rollingUpdate:
  maxSurge: 25%
  maxUnavailable: 25%

# Rollout spec.strategy.canary, verbatim — any upstream field works here
# (steps, analysis, stableMetadata, maxSurge, trafficRouting.managedRoutes,
# virtualServices, ...). Strings are tpl-rendered so these defaults track the
# release name. Overrides follow normal Helm coalescing: maps deep-merge,
# lists replace wholesale, and `key: null` deletes a default — e.g. set
# `trafficRouting: null` to run a canary without Istio. The default
# trafficRouting expects ingress.enabled=true (it references the chart's
# VirtualService). Referenced AnalysisTemplates are not rendered by this
# chart — deploy them alongside it.
canary:
  stableService: '{{ include "bluebird.fullname" . }}'
  canaryService: '{{ include "bluebird.fullname" . }}-canary'
  stableMetadata:
    labels:
      role: stable
  canaryMetadata:
    labels:
      role: canary
  dynamicStableScale: true
  trafficRouting:
    istio:
      virtualService:
        name: '{{ include "bluebird.fullname" . }}'
        routes:
          - '{{ include "bluebird.fullname" . }}-stable'
  steps:
    - setWeight: 33
    - setWeight: 66
    - setWeight: 100

# Rollout spec.strategy.blueGreen, verbatim (tpl-rendered, same rules).
blueGreen:
  activeService: '{{ include "bluebird.fullname" . }}'
  previewService: '{{ include "bluebird.fullname" . }}-canary'
  autoPromotionEnabled: true

# Deep-merged over the rendered Deployment/Rollout spec as the final word
# (tpl-rendered) — the escape hatch that makes every workload field reachable
# without a dedicated value: revisionHistoryLimit, minReadySeconds,
# progressDeadlineSeconds, rollbackWindow, template.spec.initContainers,
# template.spec.topologySpreadConstraints, ... Maps merge recursively; lists
# replace wholesale.
specOverrides: {}

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  gatewaySelector:
    istio: gateway
  hosts:
    - chart-example.local
  port: 80
  httpsRedirect: false
  tls:
    enabled: false
    credentialName: ""
  mesh: true

experiment:
  enabled: false
  host: ""
