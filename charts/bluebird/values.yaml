nameOverride: ""
fullnameOverride: ""
commonLabels: {}
commonAnnotations: {}

replicas: 1

image:
  name: zimmertr/bluebird
  # Empty = chart appVersion. The repo publishes SemVer tags only, no `latest`.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

containerPort: 8000
extraEnv: []
resources: {}
podSecurityContext: {}
securityContext: {}

probes:
  liveness:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    httpGet:
      path: /
      port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
  startup:
    enabled: true
    httpGet:
      path: /
      port: 8000
    failureThreshold: 30
    periodSeconds: 5

# RollingUpdate | Recreate -> Deployment. Canary | BlueGreen -> Argo Rollout.
# The matching block below becomes the workload's spec.strategy verbatim.
strategy: RollingUpdate

# Deployment spec.strategy.rollingUpdate, verbatim. Empty = API defaults.
rollingUpdate: {}

# Rollout spec.strategy.canary, verbatim (tpl-rendered so the defaults track
# the release name). Anything env-specific — trafficRouting, analysis,
# experiments — is opt-in; see the README for an Istio example.
canary:
  stableService: '{{ include "bluebird.fullname" . }}'
  canaryService: '{{ include "bluebird.fullname" . }}-canary'
  stableMetadata:
    labels:
      role: stable
  canaryMetadata:
    labels:
      role: canary
  steps:
    - setWeight: 33
    - setWeight: 66
    - setWeight: 100

# Rollout spec.strategy.blueGreen, verbatim (tpl-rendered).
blueGreen:
  activeService: '{{ include "bluebird.fullname" . }}'
  previewService: '{{ include "bluebird.fullname" . }}-canary'

podAnnotations: {}
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  gatewaySelector:
    istio: gateway
  hosts:
    - chart-example.local
  port: 80
  httpsRedirect: false
  tls:
    enabled: false
    credentialName: ""
  mesh: true

experiment:
  enabled: false
  host: ""
