{{- $isRollout := eq (include "bluebird.isRollout" .) "true" -}}
{{- /*
The spec is assembled as a dict rather than literal YAML so the strategy
blocks pass through from values verbatim (tpl-rendered, letting defaults
reference the release name) and specOverrides can deep-merge over anything
chart-managed as the final word.
*/ -}}
{{- $spec := dict
      "replicas" .Values.replicas
      "selector" (dict "matchLabels" (include "bluebird.selectorLabels" . | fromYaml))
      "template" (include "bluebird.podTemplate" . | fromYaml)
-}}
{{- if eq .Values.strategy "Canary" -}}
  {{- $_ := set $spec "strategy" (dict "canary" (tpl (toYaml .Values.canary) . | fromYaml)) -}}
{{- else if eq .Values.strategy "BlueGreen" -}}
  {{- $_ := set $spec "strategy" (dict "blueGreen" (tpl (toYaml .Values.blueGreen) . | fromYaml)) -}}
{{- else -}}
  {{- $strategy := dict "type" .Values.strategy -}}
  {{- if and (eq .Values.strategy "RollingUpdate") .Values.rollingUpdate -}}
    {{- $_ := set $strategy "rollingUpdate" .Values.rollingUpdate -}}
  {{- end -}}
  {{- $_ := set $spec "strategy" $strategy -}}
{{- end -}}
{{- with .Values.specOverrides -}}
  {{- $spec = mustMergeOverwrite $spec (tpl (toYaml .) $ | fromYaml) -}}
{{- end -}}
apiVersion: {{ $isRollout | ternary "argoproj.io/v1alpha1" "apps/v1" }}
kind: {{ $isRollout | ternary "Rollout" "Deployment" }}
metadata:
  name: {{ include "bluebird.fullname" . }}
  namespace: {{ include "bluebird.namespace" . }}
  labels:
    {{- include "bluebird.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml $spec | nindent 2 }}
