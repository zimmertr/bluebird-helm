name: Release Chart

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - 'artifacthub-repo.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish OCI chart
    runs-on: ubuntu-latest
    permissions:
      contents: write  # git tag + GitHub release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GitVersion needs full history

      - uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'
      - id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - uses: azure/setup-helm@v4

      # Charts are semver-tagged; skip if this version was already pushed.
      - name: Check if chart version already published
        id: exists
        run: |
          VER="${{ steps.gitversion.outputs.semVer }}"
          if helm show chart "oci://registry-1.docker.io/zimmertr/bluebird-helm" --version "$VER" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Chart $VER already published — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package & push chart
        if: steps.exists.outputs.exists == 'false'
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          VER="${{ steps.gitversion.outputs.semVer }}"
          echo "$DOCKERHUB_TOKEN" | helm registry login registry-1.docker.io -u "$DOCKERHUB_USERNAME" --password-stdin
          helm package charts/bluebird --version "$VER"
          helm push "bluebird-helm-${VER}.tgz" oci://registry-1.docker.io/zimmertr

      - name: Tag & release
        if: steps.exists.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.gitversion.outputs.semVer }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VER}" -m "Chart v${VER}"
          git push origin "v${VER}"
          gh release create "v${VER}" --title "v${VER}" --generate-notes

      # Publishes the Artifact Hub ownership metadata under the special
      # "artifacthub.io" tag (Verified Publisher badge) via the OCI distribution
      # API directly. oras could not authenticate against Docker Hub here (login
      # succeeds, push 401) while a direct bearer token works. Runs last and after
      # Tag & release so it can never block a release. No-op until the repo is
      # registered and its repositoryID recorded in the metadata file.
      - name: Publish Artifact Hub metadata
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          ID=$(grep -E '^repositoryID:' artifacthub-repo.yml | sed -E 's/repositoryID:[[:space:]]*//; s/["'\'' ]//g; s/#.*//')
          if [ -z "$ID" ]; then
            echo "repositoryID not set — skipping Artifact Hub metadata push."
            exit 0
          fi
          REPO=zimmertr/bluebird-helm
          REG=https://registry-1.docker.io
          FILE=artifacthub-repo.yml
          MC=application/vnd.cncf.artifacthub.config.v1+yaml
          ML=application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
          TOKEN=$(curl -fsSL -u "${DOCKERHUB_USERNAME}:${DOCKERHUB_TOKEN}" \
            "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${REPO}:pull,push" | jq -r .token)
          EMPTY=sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          LAYER=sha256:$(sha256sum "$FILE" | cut -d' ' -f1)
          SIZE=$(wc -c < "$FILE" | tr -d ' ')
          put_blob() {  # $1=digest  $2=--data-binary value ("" or @file)
            local loc sep
            loc=$(curl -fsS -X POST -D - -o /dev/null -H "Authorization: Bearer $TOKEN" \
              "${REG}/v2/${REPO}/blobs/uploads/" | awk 'tolower($1)=="location:"{print $2}' | tr -d '\r')
            sep='?'; case "$loc" in *\?*) sep='&';; esac
            curl -fsS -o /dev/null -X PUT -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/octet-stream" --data-binary "$2" "${loc}${sep}digest=$1"
          }
          put_blob "$EMPTY" ""
          put_blob "$LAYER" "@${FILE}"
          MANIFEST=$(printf '{"schemaVersion":2,"mediaType":"application/vnd.oci.image.manifest.v1+json","config":{"mediaType":"%s","digest":"%s","size":0},"layers":[{"mediaType":"%s","digest":"%s","size":%s,"annotations":{"org.opencontainers.image.title":"artifacthub-repo.yml"}}]}' \
            "$MC" "$EMPTY" "$ML" "$LAYER" "$SIZE")
          curl -fsS -o /dev/null -X PUT -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/vnd.oci.image.manifest.v1+json" \
            --data-binary "$MANIFEST" "${REG}/v2/${REPO}/manifests/artifacthub.io"
          echo "Pushed Artifact Hub metadata (repositoryID=$ID)."
