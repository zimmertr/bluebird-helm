workflow: GitHubFlow/v1
strategies:
  - Mainline
tag-prefix: 'v'
branches:
  main:
    mode: ContinuousDeployment
major-version-bump-message: '^(feat!|BREAKING CHANGE:)'
minor-version-bump-message: '^feat(\(.+\))?:'
patch-version-bump-message: '^(fix|perf|refactor|chore|docs|style|test|ci)(\(.+\))?:'
